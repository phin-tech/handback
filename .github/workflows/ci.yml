name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HANDBACK_OPEN: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fails if the committed JSON Schema has drifted from the Zod source: the gen-schema hook
      # regenerates it and prek flags any modified files. Runs after npm ci so the `system` hook
      # has node_modules (tsx, zod) available.
      - uses: j178/prek-action@v2
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run build
