name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'ui/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build app (for demo assets)
        run: npm run build

      - name: Copy demo assets
        run: |
          mkdir -p docs/public/demo-assets
          cp dist/ui/assets/*.js docs/public/demo-assets/app.js
          cp dist/ui/assets/*.css docs/public/demo-assets/app.css

      - name: Build docs
        run: npm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
